#
# Window Customizations
#
for_window [window_role = "pop-up"] floating enable
for_window [window_role = "bubble"] floating enable
for_window [window_role = "dialog"] floating enable
for_window [window_type = "dialog"] floating enable
for_window [app_id = "floating"] floating enable

for_window [title = "^Open File$"] floating enable

for_window [app_id="^launcher$"] floating enable, border none

for_window [app_id="pulseUi"] floating enable

for_window [app_id="zoom"] floating enable

for_window [title = "^Hardware Simulator$"] floating enable
for_window [instance="sun-awt-X11-XFramePeer"] floating enable
for_window [instance="sun-awt-X11-XDialogPeer"] floating enable
